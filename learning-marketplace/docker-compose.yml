services:
  postgres:
    image: postgres:16-alpine
    container_name: learning-marketplace-postgres
    environment:
      POSTGRES_DB: learning_marketplace
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d learning_marketplace"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
