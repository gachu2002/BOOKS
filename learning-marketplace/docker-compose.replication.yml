services:
  postgres-primary:
    image: bitnami/postgresql:16
    container_name: learning-marketplace-postgres-primary
    environment:
      POSTGRESQL_POSTGRES_PASSWORD: postgres
      POSTGRESQL_USERNAME: app
      POSTGRESQL_PASSWORD: app
      POSTGRESQL_DATABASE: learning_marketplace
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: repl_user
      POSTGRESQL_REPLICATION_PASSWORD: repl_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_primary_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d learning_marketplace"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres-replica:
    image: bitnami/postgresql:16
    container_name: learning-marketplace-postgres-replica
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      POSTGRESQL_POSTGRES_PASSWORD: postgres
      POSTGRESQL_USERNAME: app
      POSTGRESQL_PASSWORD: app
      POSTGRESQL_DATABASE: learning_marketplace
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_MASTER_HOST: postgres-primary
      POSTGRESQL_MASTER_PORT_NUMBER: 5432
      POSTGRESQL_REPLICATION_USER: repl_user
      POSTGRESQL_REPLICATION_PASSWORD: repl_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_replica_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d learning_marketplace"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_primary_data:
  postgres_replica_data:
